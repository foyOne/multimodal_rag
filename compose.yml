services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    env_file:
      - .env
    ports:
      - 6333:6333 # tcp
      - 6334:6334 # grpc
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - ./data/tmp/qdrant_remote:/qdrant/storage

  api:
    build: .
    image: simple_api:v1
    container_name: fastapi_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    volumes:
      - ./data/:/app/data/
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0" ]
              capabilities: [ gpu ]

configs:
  qdrant_config:
    content: |
      log_level: INFO
